name: Refresh Zerodha Access Token

on:
  schedule:
    # Runs at 00:35 UTC = 06:05 AM IST daily (just after 6 AM token expiry)
    - cron: "35 0 * * *"
  workflow_dispatch: # Allow manual trigger from GitHub Actions tab

jobs:
  refresh-token:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install playwright pyotp kiteconnect requests
          playwright install chromium
          playwright install-deps chromium

      - name: Run token refresh script
        env:
          ZERODHA_USER_ID: ${{ secrets.ZERODHA_USER_ID }}
          ZERODHA_PASSWORD: ${{ secrets.ZERODHA_PASSWORD }}
          ZERODHA_TOTP_SECRET: ${{ secrets.ZERODHA_TOTP_SECRET }}
          API_KEY: ${{ secrets.API_KEY }}
          API_SECRET: ${{ secrets.API_SECRET }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: python backend/utils/auto_refresh_token.py

      - name: Upload debug screenshot (if login failed)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: zerodha-debug-screenshot
          path: /tmp/zerodha_debug.png
          if-no-files-found: ignore
